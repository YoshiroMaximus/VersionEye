# VersionEye configuration

# How often to automatically re-check for updates, in hours.
# Set to 0 to disable periodic checks (a check still runs once on startup).
check-interval-hours: 6

# Notify players with the "versioneye.notify" permission (ops by default)
# about outdated plugins when they join.
notify-on-join: true

# Only count a Modrinth release as an update if it declares support for this
# server's Minecraft version. Turning this on avoids suggesting updates that
# don't support your version yet, but many projects lag behind on tagging
# versions, so some real updates may be missed.
require-matching-game-version: false

# Also consider alpha/beta channel uploads on Modrinth as updates.
# Off by default so dev/snapshot builds are not reported.
# For a one-off check, /updatecheck -prerelease does this without config.
include-prereleases: false

# Fall back to Hangar (hangar.papermc.io) for plugins that are not
# published on Modrinth, e.g. ProtocolLib. Hangar has no file-hash lookup,
# so this matches by plugin name, and only Release-channel uploads count.
check-hangar: true

# Automatically download available updates into the server's update folder
# (plugins/update by default). Paper applies them on the next restart.
# Downloads are verified against the source's published file hash when one
# exists. /updatecheck download does the same thing on demand.
auto-download: false

# Post a message to this Discord webhook URL when new updates are found.
# Each plugin version is announced once. Leave empty to disable.
discord-webhook: ""

# Updates the admin chose to skip (managed by /updatecheck ignore and
# unignore). A plugin listed here with the exact latest version is reported
# as up to date until something newer is published.
ignored-versions: {}

# Map a plugin name to its exact Modrinth project slug or ID when automatic
# matching picks the wrong project (or fails to find it). The plugin name is
# the name shown in /plugins. Use "hangar:<slug>" to pin a plugin to a
# Hangar project instead. Example:
#
# overrides:
#   ViaVersion: viaversion
#   "Essentials": essentialsx
#   ProtocolLib: hangar:ProtocolLib
overrides: {}

# Plugins to skip entirely (by plugin name, case-insensitive).
exclude:
  - VersionEye
